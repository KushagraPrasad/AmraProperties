<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Amra Property</title>
    
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <link rel="stylesheet" href="../assets/css/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/main.js" defer></script>
    <script src="../assets/js/components.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'amra-primary': '#0bc1b2',
                        'amra-secondary': '#10B981',
                        'amra-dark': '#0F172A',
                        'amra-light': '#F8FAFC',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-amra-light text-amra-dark selection:bg-amra-primary selection:text-white overflow-x-hidden font-sans min-h-screen flex flex-col">

    <div id="header-placeholder"></div>

    <main class="flex-grow pt-32 pb-24">
        <div class="max-w-3xl mx-auto px-6 text-center">
            <h1 class="text-4xl md:text-5xl font-serif font-bold text-amra-dark mb-4">Get in <span class="text-amra-primary italic">Touch</span></h1>
            <p class="text-gray-600 mb-10">Have a question about a property? We're here to help.</p>
            
            <form class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col gap-6 text-left">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
                        <input type="text" class="w-full bg-slate-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:border-amra-primary" placeholder="John">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Last Name</label>
                        <input type="text" class="w-full bg-slate-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:border-amra-primary" placeholder="Doe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" class="w-full bg-slate-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:border-amra-primary" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Message</label>
                    <textarea rows="4" class="w-full bg-slate-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:border-amra-primary" placeholder="How can we help you?"></textarea>
                </div>
                <button type="button" class="bg-amra-primary text-white py-4 rounded-lg font-bold hover:bg-teal-600 transition-colors">Send Message</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
